name: Rule Timing

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  # El nightly queda documentado pero apagado; agendarlo es decision del dueno.
  # schedule:
  #   - cron: "0 8 * * 1"

env:
  RULE_TIMING_REPORT_ISSUE: "18"
  RULE_TIMING_DASHBOARD_ISSUE: "31"

permissions:
  contents: read
  issues: write

jobs:
  measure-isolated:
    name: Measure isolated rule timing
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        # actions/checkout@v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup pnpm
        # pnpm/action-setup@v6
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Use Node.js 22.14.0
        # actions/setup-node@v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies (Frozen Lockfile)
        run: pnpm install --frozen-lockfile

      - name: Measure isolated rules
        run: pnpm measure:rules -- --mode isolated --output rule-timing-isolated.json

      - name: Upload isolated timing artifact
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rule-timing-isolated
          path: rule-timing-isolated.json

  measure-all:
    name: Measure all-rules timing
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        # actions/checkout@v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup pnpm
        # pnpm/action-setup@v6
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Use Node.js 22.14.0
        # actions/setup-node@v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies (Frozen Lockfile)
        run: pnpm install --frozen-lockfile

      - name: Measure all rules and TIMING=all
        run: pnpm measure:rules -- --mode all --output rule-timing-all.json

      - name: Upload all-rules timing artifact
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rule-timing-all
          path: rule-timing-all.json

  publish:
    name: Publish rule timing results
    needs:
      - measure-isolated
      - measure-all
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        # actions/checkout@v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup pnpm
        # pnpm/action-setup@v6
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Use Node.js 22.14.0
        # actions/setup-node@v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies (Frozen Lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Download isolated timing artifact
        # actions/download-artifact@v4
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: rule-timing-isolated
          path: rule-timing-artifacts

      - name: Download all-rules timing artifact
        # actions/download-artifact@v4
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: rule-timing-all
          path: rule-timing-artifacts

      - name: Combine timing results
        run: >
          node scripts/measure-rule-timing.mjs
          --mode combine
          --isolated-input rule-timing-artifacts/rule-timing-isolated.json
          --all-input rule-timing-artifacts/rule-timing-all.json
          --output rule-timing-results.md

      - name: Publish results to issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          today="$(date -u +%F)"
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            run_label="$GITHUB_REF_NAME"
          else
            run_label="manual @ ${GITHUB_SHA::7}"
          fi

          {
            printf '## Medicion automatica por regla (%s)\n\n' "$today"
            printf '**Origen**: workflow `%s` en `%s`.\n\n' "$GITHUB_WORKFLOW" "$GITHUB_SHA"
            cat rule-timing-results.md
          } > /tmp/rule-timing-comment.md

          gh issue comment "$RULE_TIMING_REPORT_ISSUE" --body-file /tmp/rule-timing-comment.md
          gh issue view "$RULE_TIMING_REPORT_ISSUE" --json body --jq .body > /tmp/issue-18-body.md

          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from "node:fs";

          const bodyPath = "/tmp/issue-18-body.md";
          const reportPath = "rule-timing-results.md";
          const body = readFileSync(bodyPath, "utf8");
          const report = readFileSync(reportPath, "utf8");
          const tableMatch = /^## Tabla de resultados[\s\S]*?(?=\n## )/m.exec(report);

          if (!tableMatch) {
            throw new Error("No se encontro la seccion Tabla de resultados.");
          }

          const replacement = tableMatch[0].trim();
          const updated = body.replace(
            /^## Tabla de resultados[\s\S]*?(?=\n## Acciones ya ejecutadas)/m,
            `${replacement}\n\n`,
          );

          if (updated === body) {
            throw new Error("No se pudo reemplazar el placeholder del issue.");
          }

          writeFileSync("/tmp/issue-18-body-updated.md", updated);
          EOF

          gh issue edit "$RULE_TIMING_REPORT_ISSUE" --body-file /tmp/issue-18-body-updated.md
          gh issue view "$RULE_TIMING_DASHBOARD_ISSUE" --json body --jq .body > /tmp/issue-dashboard-body.md

          RUN_LABEL="$run_label" TODAY="$today" node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from "node:fs";

          const bodyPath = "/tmp/issue-dashboard-body.md";
          const reportPath = "rule-timing-results.md";
          const body = readFileSync(bodyPath, "utf8");
          const report = readFileSync(reportPath, "utf8");
          const startMarker = "<!-- RULE-TIMING-TABLE:START -->";
          const endMarker = "<!-- RULE-TIMING-TABLE:END -->";

          const tableSectionMatch =
            /^## Tabla de resultados[\s\S]*?(?=\n## )/m.exec(report);

          if (!tableSectionMatch) {
            throw new Error("No se encontro la seccion Tabla de resultados.");
          }

          const rows = tableSectionMatch[0]
            .split("\n")
            .filter((line) => line.startsWith("| "))
            .map((line) =>
              line
                .trim()
                .slice(1, -1)
                .split("|")
                .map((cell) => cell.trim()),
            )
            .filter(
              ([rule]) => rule !== "Regla" && !/^-+$/.test(rule),
            )
            .map(([rule, ms, typeAware]) => ({
              ms,
              numericMs: Number(ms),
              rule,
              typeAware,
            }));

          const takeRow = (predicate, description) => {
            const row = rows.find(predicate);

            if (!row) {
              throw new Error(`No se encontro la fila ${description}.`);
            }

            return row;
          };

          const allTogether = takeRow(
            (row) => row.rule.includes("TODAS_JUNTAS"),
            "TODAS_JUNTAS",
          );
          const sumIndividuals = takeRow(
            (row) => row.rule.includes("SUMA_INDIVIDUALES"),
            "SUMA_INDIVIDUALES",
          );
          const programFloor = takeRow(
            (row) => row.rule.includes("_programa TS_"),
            "_programa TS_",
          );
          const startup = takeRow(
            (row) => row.rule.includes("_arranque_"),
            "_arranque_",
          );
          const ruleRows = rows
            .filter((row) => /^`skapxd\//.test(row.rule))
            .sort((left, right) => right.numericMs - left.numericMs);
          const dashboardRows = [
            { ...allTogether, rule: "**TODAS_JUNTAS**" },
            { ...sumIndividuals, rule: "**SUMA_INDIVIDUALES**" },
            ...ruleRows,
            { ...programFloor, rule: "_programa TS_" },
            { ...startup, rule: "_arranque_" },
          ];
          const dashboard = [
            `## ${process.env.RUN_LABEL} (${process.env.TODAY} UTC)`,
            "",
            "| Regla | ms | type-aware? |",
            "| --- | ---: | --- |",
            ...dashboardRows.map(
              (row) => `| ${row.rule} | ${row.ms} | ${row.typeAware} |`,
            ),
          ].join("\n");
          const startIndex = body.indexOf(startMarker);
          const endIndex = body.indexOf(endMarker);

          if (startIndex === -1 || endIndex === -1 || endIndex < startIndex) {
            throw new Error("No se encontraron los marcadores del dashboard.");
          }

          const updated =
            body.slice(0, startIndex + startMarker.length) +
            `\n${dashboard}\n` +
            body.slice(endIndex);

          writeFileSync("/tmp/issue-dashboard-body-updated.md", updated);
          EOF

          gh issue edit "$RULE_TIMING_DASHBOARD_ISSUE" --body-file /tmp/issue-dashboard-body-updated.md
