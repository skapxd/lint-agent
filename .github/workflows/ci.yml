name: CI/CD

on:
  push:
    branches: [ "main" ]
    # Cada tag vX.Y.Z dispara la publicación a NPM
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # pnpm 11 requiere Node >= 22.13
        node-version: [22.x, 24.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies (Frozen Lockfile)
      run: pnpm install --frozen-lockfile

    - name: Type Check
      run: pnpm typecheck

    - name: Lint
      run: pnpm lint

    - name: Run Tests
      run: pnpm test

  peer-minimum-contract:
    name: Peer Minimum Contract
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Use Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'pnpm'

    - name: Install dependencies (Frozen Lockfile)
      run: pnpm install --frozen-lockfile

    - name: Check peer minimum contract
      run: pnpm test:peer-minimum

  peer-latest-contract:
    name: Peer Latest Contract
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Use Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'pnpm'

    - name: Install dependencies (Frozen Lockfile)
      run: pnpm install --frozen-lockfile

    - name: Check peer latest contract
      run: pnpm test:peer-latest

  publish:
    name: Publish to NPM
    needs:
      - build-and-test
      - peer-minimum-contract
      - peer-latest-contract
    if: startsWith(github.ref, 'refs/tags/v') # Solo corre en tags de versión
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      # SIN `registry-url`: esa opcion hace que setup-node escriba un .npmrc con
      # `_authToken=${NODE_AUTH_TOKEN}` y exporte un NODE_AUTH_TOKEN placeholder
      # (XXXXX-XXXXX-...). npm lo toma como credencial y NUNCA intenta OIDC -> 404.
      # Sin authToken + id-token: write + npm >= 11.5.1, npm usa el Trusted Publisher.
      - name: Setup Node.js for Publishing
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Package
        run: pnpm build

      # npm >= 11.5.1 via npx (Setup pnpm altera el prefix global, asi que
      # `npm install -g` no actualiza el npm que corre aqui). El id-token de Actions
      # autentica contra el Trusted Publisher OIDC; la provenance se genera sola.
      - name: Publish to NPM (OIDC trusted publisher)
        run: |
          npx -y npm@latest --version
          npx -y npm@latest publish --access public
