name: CI/CD

on:
  push:
    branches: [ "main" ]
    # Cada tag vX.Y.Z dispara la publicación a NPM
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # pnpm 11 requiere Node >= 22.13
        node-version: [22.x, 24.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies (Frozen Lockfile)
      run: pnpm install --frozen-lockfile

    - name: Type Check
      run: pnpm typecheck

    - name: Lint
      run: pnpm lint

    - name: Run Tests
      run: pnpm test

  peer-minimum-contract:
    name: Peer Minimum Contract
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Use Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'pnpm'

    - name: Install dependencies (Frozen Lockfile)
      run: pnpm install --frozen-lockfile

    - name: Check peer minimum contract
      run: pnpm test:peer-minimum

  peer-latest-contract:
    name: Peer Latest Contract
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Use Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'pnpm'

    - name: Install dependencies (Frozen Lockfile)
      run: pnpm install --frozen-lockfile

    - name: Check peer latest contract
      run: pnpm test:peer-latest

  publish:
    name: Publish to NPM
    needs:
      - build-and-test
      - peer-minimum-contract
      - peer-latest-contract
    if: startsWith(github.ref, 'refs/tags/v') # Solo corre en tags de versión
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js for Publishing
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Package
        run: pnpm build

      # Sin NODE_AUTH_TOKEN: el Trusted Publisher (OIDC) autentica via el id-token
      # de Actions (permissions.id-token: write); la provenance se genera sola.
      # OJO: `Setup pnpm` altera el prefix global de npm, asi que `npm install -g
      # npm@latest` NO actualizaba el npm que corre el publish (quedaba en 10.x, sin
      # OIDC -> caia al token placeholder de setup-node y daba 404). `npx npm@latest`
      # garantiza npm >= 11.5.1 (requisito de OIDC) en el publish mismo.
      - name: Publish to NPM (OIDC trusted publisher)
        run: npx -y npm@latest publish --access public
